<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f0ede8">
  <title>Slide Puzzle</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── Puzzle view ──────────────────────────────────────────────────── -->
  <section id="puzzle-view" class="view active">

    <header class="puzzle-header">
<h1 id="level-label">Level 1</h1>
      <div class="header-actions">
        <button class="btn-ghost" id="skip-btn" aria-label="Skip level" hidden>Skip</button>
        <button class="btn-ghost" id="autoplay-btn" aria-label="Auto-play solution">Auto-play</button>
        <button class="btn-ghost" id="restart-btn" aria-label="Restart level">Restart</button>
        <input id="level-jump-input" type="number" min="1" step="1" placeholder="#">
        <button class="btn-ghost" id="level-jump-btn" aria-label="Jump to level">Go</button>
      </div>
    </header>
    <div id="cog-debug" hidden></div>

    <div class="resource-bar">
      <div id="gear-hearts" class="gear-hearts"></div>
      <div class="chain-bar-track">
        <div id="chain-bar-fill" class="chain-bar-fill"></div>
      </div>
    </div>

    <div id="grid-container"></div>

    <nav id="dpad" aria-label="Directional controls">
      <button data-dir="up"    aria-label="Move up">↑</button>
      <button data-dir="left"  aria-label="Move left">←</button>
      <button data-dir="right" aria-label="Move right">→</button>
      <button data-dir="down"  aria-label="Move down">↓</button>
    </nav>

  </section>

  <!-- ── Level select view (stub) ─────────────────────────────────────── -->
  <section id="levelselect-view" class="view">
    <p>Level select — coming soon</p>
  </section>

  <!-- ── Win overlay ──────────────────────────────────────────────────── -->
  <div id="win-banner" hidden>
    <p>Level complete!</p>
    <span class="win-hint">Tap anywhere to continue</span>
  </div>

  <!-- ── Dead-end overlay ─────────────────────────────────────────────── -->
  <div id="dead-end-banner" hidden>
    <p>No way out!</p>
    <span class="win-hint">Tap anywhere to restart</span>
  </div>

  <div id="debug-btns" hidden>
    <button id="debug-btn" class="btn-ghost">dbg</button>
    <button id="chain-debug-btn" class="btn-ghost">chain</button>
    <button id="gen-debug-open-btn" class="btn-ghost">gen</button>
    <button id="batch-test-btn" class="btn-ghost">test 50</button>
    <label id="speed-control">
      <span id="speed-label">1×</span>
      <input id="speed-slider" type="range" min="0.25" max="8" step="0.25" value="1">
    </label>
  </div>

  <!-- ── Generator debug panel ────────────────────────────────────────────── -->
  <div id="gen-debug-panel" hidden>
    <div id="gen-debug-header">
      <span>Generator Debug</span>
      <div class="gen-debug-controls">
        <label>seed <input id="gen-debug-seed" type="number" value="0"></label>
        <label>w <input id="gen-debug-w" type="number" value="9" min="3" max="20"></label>
        <label>h <input id="gen-debug-h" type="number" value="9" min="3" max="20"></label>
        <button id="gen-debug-run">Generate</button>
        <button id="gen-debug-universes">universes</button>
        <button id="gen-debug-close">✕</button>
      </div>
    </div>
    <div id="gen-debug-canvas-wrap">
      <canvas id="gen-debug-canvas"></canvas>
      <div id="gen-debug-legend">
        <span class="gl-untouched">untouched</span>
        <span class="gl-empty">empty</span>
        <span class="gl-sticky">sticky</span>
        <span class="gl-block">block</span>
        <span class="gl-oneway">oneway</span>
        <span class="gl-crumble">crumble</span>
        <span class="gl-key">key</span>
        <span class="gl-door">door</span>
        <span class="gl-from">▶ from</span>
        <span class="gl-to">● to</span>
        <span class="gl-depth">gear depth</span>
        <span class="gl-chain">chain len</span>
      </div>
    </div>
    <div id="gen-debug-label">—</div>
    <input type="range" id="gen-debug-slider" min="0" max="0" value="0">
    <div id="gen-debug-counter">— / —</div>
  </div>

  <script>
    if (new URLSearchParams(location.search).has('debug')) {
      document.getElementById('debug-btns').hidden = false;
      document.getElementById('skip-btn').hidden   = false;
    }
  </script>

  <script type="module">
    import { init, skipLevel, autoPlay, runBatchPlaythrough, jumpToLevel } from './game.js';
    import { setSpeedMultiplier } from './renderer.js';

    document.getElementById('debug-btn')
      .addEventListener('click', () => document.body.classList.toggle('debug'));

    document.getElementById('chain-debug-btn')
      .addEventListener('click', () => document.body.classList.toggle('chain-debug'));

    document.getElementById('skip-btn')
      .addEventListener('click', () => skipLevel());

    document.getElementById('autoplay-btn')
      .addEventListener('click', () => autoPlay());

    document.getElementById('batch-test-btn')
      .addEventListener('click', () => runBatchPlaythrough(50));

    const levelJumpInput = document.getElementById('level-jump-input');
    document.getElementById('level-jump-btn').addEventListener('click', () => {
      const n = parseInt(levelJumpInput.value);
      if (n >= 1) jumpToLevel(n);
    });
    levelJumpInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const n = parseInt(levelJumpInput.value);
        if (n >= 1) jumpToLevel(n);
      }
    });

    document.getElementById('speed-slider').addEventListener('input', e => {
      const m = parseFloat(e.target.value);
      setSpeedMultiplier(m);
      document.getElementById('speed-label').textContent = m + '×';
    });

    init();
</script>

  <script type="module">
    import { generateLevel, computeStepAnalysis } from './generator.js';
    import { getCurrentLevel } from './game.js';
    import { solve } from './solver.js';
    import { buildToggleMap, slidePlayer } from './puzzle.js';

    const panel   = document.getElementById('gen-debug-panel');
    const canvas  = document.getElementById('gen-debug-canvas');
    const slider  = document.getElementById('gen-debug-slider');
    const label   = document.getElementById('gen-debug-label');
    const counter = document.getElementById('gen-debug-counter');

    document.getElementById('gen-debug-open-btn').addEventListener('click', () => {
      panel.hidden = false;
      // Auto-generate from the current level's seed when opening.
      const lvl = getCurrentLevel();
      if (lvl) {
        document.getElementById('gen-debug-seed').value = lvl.seed ?? 0;
        document.getElementById('gen-debug-w').value    = lvl.width  ?? 9;
        document.getElementById('gen-debug-h').value    = lvl.height ?? 9;
        runGenerate(lvl.weights);
      }
    });
    document.getElementById('gen-debug-close').addEventListener('click', () => { panel.hidden = true; });

    document.getElementById('gen-debug-universes').addEventListener('click', () => {
      _universeMode = !_universeMode;
      document.getElementById('gen-debug-universes').classList.toggle('active', _universeMode);
      renderStep(+slider.value);
    });

    let _steps            = [];
    let _depths           = null;   // Int16Array from final generateLevel result
    let _difficulties     = null;   // Float32Array
    let _levelW           = 0;
    let _levelH           = 0;
    let _levelStart       = null;
    let _universeMode          = false;
    let _doorRequirements      = null;   // Map<outputFlatIdx, toggleIdx> from final result
    let _finalCells            = null;   // Uint8Array output cells (CellType values)
    let _universeDepths        = null;   // Array<Int16Array> indexed by worldState bitmask
    let _universeChainLengths  = null;   // Array<Int16Array> indexed by worldState bitmask
    let _pathCellOrder  = null;   // [{px,py}] padded-grid cells in path order
    let _pathCellReveal = null;   // Map<"px,py" → stepIndex> when each cell first appears

    function runGenerate(weights) {
      const seed = parseInt(document.getElementById('gen-debug-seed').value) || 0;
      const w    = parseInt(document.getElementById('gen-debug-w').value)    || 9;
      const h    = parseInt(document.getElementById('gen-debug-h').value)    || 9;
      _steps = [];
      const result = generateLevel(w, h, { seed, id: 'dbg', weights, _steps });
      _depths           = result.depths;
      _difficulties     = result.difficulties;
      _levelW           = w;
      _levelH           = h;
      _levelStart       = result.start;
      _doorRequirements     = result.doorRequirements;
      _finalCells           = result.cells;
      _universeDepths       = result.universeDepths;
      _universeChainLengths = result.universeChainLengths;

      // Compute optimal path, then map each path cell to the step that first carves it
      _pathCellOrder = null;
      _pathCellReveal = null;
      if (result.start && result.goal && _steps.length > 0) {
        const toggleMap  = buildToggleMap(result.cells);
        const chainLimit = result.effectiveChainLength > 0 ? result.effectiveChainLength : (w + h);
        const moves      = solve(result, result.start, 0, toggleMap, chainLimit);
        if (moves) {
          // Build waypoints: boat (y=-1) → landing → each slide endpoint
          const waypoints = [{ x: result.start.x, y: -1 }, { ...result.start }];
          let pos = { ...result.start }, ws = 0, totalCells = 0;
          for (const { dx, dy } of moves) {
            const chainAvail = Math.max(0, chainLimit - totalCells);
            const r = slidePlayer(result, pos, dx, dy, toggleMap, ws, null, chainAvail);
            if (r.crumble?.toggleIdx      !== undefined) ws |= (1 << r.crumble.toggleIdx);
            if (r.keyCollected?.toggleIdx !== undefined) ws |= (1 << r.keyCollected.toggleIdx);
            totalCells += Math.abs(r.x - pos.x) + Math.abs(r.y - pos.y);
            pos = { x: r.x, y: r.y };
            waypoints.push({ ...pos });
          }

          // Expand waypoints into individual cells (padded coords) + travel direction
          const seen = new Set(), order = [];
          for (let wi = 0; wi < waypoints.length - 1; wi++) {
            const a = waypoints[wi], b = waypoints[wi + 1];
            const sdx = Math.sign(b.x - a.x), sdy = Math.sign(b.y - a.y);
            if (sdx === 0 && sdy === 0) continue;
            let cx = a.x, cy = a.y;
            while (true) {
              const px = cx + 1, py = cy + 1; // inner → padded (y=-1 → py=0 = boat row)
              const key = `${px},${py}`;
              if (!seen.has(key)) { seen.add(key); order.push({ px, py, sdx, sdy }); }
              if (cx === b.x && cy === b.y) break;
              cx += sdx; cy += sdy;
            }
          }

          // For each path cell find the first step that carves it in the path direction:
          // step.toX/toY = the cell being carved, step.fromX/fromY = the carving source.
          // Direction match: (toX-fromX, toY-fromY) === (sdx, sdy).
          // Border/boat cells (py===0) are always carved from the start; reveal at 0.
          const pw = _steps[0].pw, ph = _steps[0].ph;
          const reveal = new Map();
          for (const { px, py, sdx, sdy } of order) {
            const key = `${px},${py}`;
            if (px === 0 || py === 0 || px === pw - 1 || py === ph - 1) {
              reveal.set(key, 0); // border/boat cells visible immediately
              continue;
            }
            let found = -1;
            for (let si = 0; si < _steps.length; si++) {
              const { toX, toY, fromX, fromY } = _steps[si];
              if (toX === px && toY === py && fromX >= 0 && fromY >= 0 &&
                  toX - fromX === sdx && toY - fromY === sdy) {
                found = si; break;
              }
            }
            // Fallback: first time cell is non-UNTOUCHED (no direction match found)
            if (found < 0) {
              found = _steps.length - 1;
              for (let si = 0; si < _steps.length; si++) {
                if (_steps[si].grid[py * pw + px] !== 0) { found = si; break; }
              }
            }
            reveal.set(key, found);
          }

          _pathCellOrder  = order;
          _pathCellReveal = reveal;
        }
      }

      slider.max   = Math.max(0, _steps.length - 1);
      slider.value = _steps.length - 1;
      renderStep(_steps.length - 1);
    }

    document.getElementById('gen-debug-run').addEventListener('click', () => {
      const lvl = getCurrentLevel();
      runGenerate(lvl?.weights);
    });

    slider.addEventListener('input', () => renderStep(parseInt(slider.value)));

    // Keyboard: arrow keys to step through when panel is open
    document.addEventListener('keydown', e => {
      if (panel.hidden) return;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        slider.value = Math.min(+slider.value + 1, +slider.max);
        renderStep(+slider.value);
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        slider.value = Math.max(+slider.value - 1, 0);
        renderStep(+slider.value);
      }
    });

    function renderStep(i) {
      if (!_steps.length) return;
      const step = _steps[Math.min(i, _steps.length - 1)];
      label.textContent   = step.label;
      counter.textContent = `${i + 1} / ${_steps.length}`;
      if (_universeMode) {
        drawUniverses(step);
      } else {
        // Use final depth/difficulty values so numbers stay stable as the slider advances.
        // The per-step recomputation caused values to jump as partial grids opened new paths.
        drawStep(step, _depths, _difficulties);
      }
    }

    // G enum values → fill colours (matches generator.js G object)
    const CELL_COLORS = [
      '#999',       // 0 UNTOUCHED
      '#e4e0da',    // 1 EMPTY
      '#c8a060',    // 2 STICKY
      '#2b2926',    // 3 BLOCK
      '#7ab8a0',    // 4 ONEWAY
      '#7d5a40',    // 5 CRUMBLE
      '#d4a820',    // 6 KEY
      '#4a80b0',    // 7 DOOR
    ];

    function drawStep(step, depths, difficulties) {
      const { grid, pw, ph, fromX, fromY, toX, toY } = step;

      // Size canvas to fit the panel, keeping cells square
      const wrap = canvas.parentElement;
      const maxW = wrap.clientWidth  - 4;
      const maxH = wrap.clientHeight - 32; // leave room for legend
      const size = Math.max(4, Math.floor(Math.min(maxW / pw, maxH / ph)));
      canvas.width  = pw * size;
      canvas.height = ph * size;

      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let cy = 0; cy < ph; cy++) {
        for (let cx = 0; cx < pw; cx++) {
          const cell = grid[cy * pw + cx];
          ctx.fillStyle = CELL_COLORS[cell] ?? '#999';
          ctx.fillRect(cx * size, cy * size, size - 1, size - 1);

          // Overlay depth (top-left, blue) and difficulty (bottom-right, red)
          // only for inner cells (not border padding) and only when data exists.
          if (size >= 10 && cx > 0 && cy > 0 && cx < pw - 1 && cy < ph - 1 && depths && cell !== 0) {
            const ix = cx - 1, iy = cy - 1;
            const fi = iy * _levelW + ix;
            const d  = depths[fi];
            const df = difficulties?.[fi];
            const fontSize = Math.max(5, Math.floor(size * 0.22));
            ctx.font = `700 ${fontSize}px system-ui, sans-serif`;

            if (d !== undefined && d >= 0) {
              ctx.fillStyle = cell === 3 ? 'rgba(255,255,255,0.25)' : '#3a6fd8';
              ctx.fillText(d, cx * size + 2, cy * size + fontSize + 1);
            }
            if (df !== undefined && df >= 0) {
              ctx.fillStyle = cell === 3 ? 'rgba(255,255,255,0.25)' : '#c04020';
              const txt = df % 1 === 0 ? df : df.toFixed(1);
              const tw  = ctx.measureText(txt).width;
              ctx.fillText(txt, cx * size + size - tw - 2, cy * size + size - 3);
            }
          }

          // Direction arrows: show which directions have been explored FROM this cell
          // in the currently-active universe.
          const _activeVD = step.allUniverseVDs?.get(step.currentUniverseKey ?? '');
          if (_activeVD && size >= 8 && cell !== 0 /* not UNTOUCHED */) {
            const dirs = _activeVD.get(cy * pw + cx);
            if (dirs && dirs.size > 0) {
              const px = cx * size, py = cy * size;
              const half = (size - 1) / 2;
              const aw = Math.max(2, size * 0.18); // half-width of arrow base
              const margin = Math.max(1, size * 0.08); // gap from cell edge
              ctx.fillStyle = 'rgba(255, 230, 0, 0.85)';
              for (const dir of dirs) {
                ctx.beginPath();
                if (dir === 'UP') {
                  ctx.moveTo(px + half - aw, py + aw * 2 + margin);
                  ctx.lineTo(px + half + aw, py + aw * 2 + margin);
                  ctx.lineTo(px + half,       py + margin);
                } else if (dir === 'DOWN') {
                  ctx.moveTo(px + half - aw, py + size - 1 - aw * 2 - margin);
                  ctx.lineTo(px + half + aw, py + size - 1 - aw * 2 - margin);
                  ctx.lineTo(px + half,       py + size - 1 - margin);
                } else if (dir === 'LEFT') {
                  ctx.moveTo(px + aw * 2 + margin, py + half - aw);
                  ctx.lineTo(px + aw * 2 + margin, py + half + aw);
                  ctx.lineTo(px + margin,            py + half);
                } else if (dir === 'RIGHT') {
                  ctx.moveTo(px + size - 1 - aw * 2 - margin, py + half - aw);
                  ctx.lineTo(px + size - 1 - aw * 2 - margin, py + half + aw);
                  ctx.lineTo(px + size - 1 - margin,            py + half);
                }
                ctx.closePath();
                ctx.fill();
              }
            }
          }
        }
      }

      // "from" highlight — blue outline
      if (fromX >= 0 && fromY >= 0) {
        ctx.strokeStyle = '#3a6fd8';
        ctx.lineWidth   = Math.max(2, size * 0.15);
        ctx.strokeRect(fromX * size + 1, fromY * size + 1, size - 3, size - 3);
      }

      // "to" highlight — orange outline
      if (toX >= 0 && toY >= 0) {
        ctx.strokeStyle = '#e8a020';
        ctx.lineWidth   = Math.max(2, size * 0.15);
        ctx.strokeRect(toX * size + 1, toY * size + 1, size - 3, size - 3);
      }

      // Optimal path overlay — bright pink line, revealed cell-by-cell as the generator carves them
      if (_pathCellOrder && _pathCellReveal && _pathCellOrder.length >= 1) {
        const currentStep = parseInt(slider.value);
        const half = (size - 1) / 2;
        const toCx = (px) => px * size + half;
        const toCy = (py) => py * size + half;

        ctx.save();
        ctx.lineJoin = 'round';
        ctx.lineCap  = 'round';

        // Glow + line: walk path in order, moveTo on first revealed cell of each run,
        // lineTo for consecutive revealed cells, break on any unrevealed gap
        const drawLine = (lw, alpha, blur) => {
          ctx.lineWidth   = lw;
          ctx.globalAlpha = alpha;
          ctx.shadowBlur  = blur;
          ctx.beginPath();
          let inLine = false;
          for (const { px, py } of _pathCellOrder) {
            if ((_pathCellReveal.get(`${px},${py}`) ?? Infinity) <= currentStep) {
              const cx = toCx(px), cy = toCy(py);
              if (!inLine) { ctx.moveTo(cx, cy); inLine = true; }
              else          { ctx.lineTo(cx, cy); }
            } else {
              inLine = false;
            }
          }
          ctx.stroke();
        };

        ctx.strokeStyle = '#ff2d9b';
        ctx.shadowColor = '#ff2d9b';
        drawLine(Math.max(3, size * 0.3), 0.55, Math.max(6, size * 0.55)); // glow
        drawLine(Math.max(2, size * 0.18), 1,    0);                        // solid

        // Dots at each revealed path cell
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
        for (const { px, py } of _pathCellOrder) {
          if ((_pathCellReveal.get(`${px},${py}`) ?? Infinity) > currentStep) continue;
          const cx = toCx(px), cy = toCy(py);
          const r = Math.max(2, size * 0.16);
          ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.fillStyle = '#ff2d9b'; ctx.fill();
          ctx.beginPath(); ctx.arc(cx, cy, Math.max(0.8, r * 0.4), 0, Math.PI * 2);
          ctx.fillStyle = 'white'; ctx.fill();
        }

        ctx.restore();
      }
    }
    // ── Universe matrix view ──────────────────────────────────────────────────
    // Shows all 2^N worldState variants of the current generation step side by
    // side.  Toggle map is built from _finalCells so bitmask indices stay
    // consistent across steps and match the _doorRequirements indices.
    function drawUniverses(step) {
      if (!_finalCells) return;
      const { grid, pw, ph, fromX, fromY, toX, toY } = step;
      const w = pw - 2, h = ph - 2;

      // Build toggle map from final output cells (CellType: CRUMBLE=7, KEY=8)
      // so toggle indices are stable and match _doorRequirements.
      const finalToggleMap = new Map(); // outputFlatIdx → toggleIdx
      let toggleCount = 0;
      for (let i = 0; i < _finalCells.length; i++) {
        if (_finalCells[i] === 7 || _finalCells[i] === 8) finalToggleMap.set(i, toggleCount++);
      }

      // Convert a VD key (sorted padded cell indices joined by ',') → bitmask integer.
      function vdKeyToWS(key) {
        if (!key) return 0;
        let ws = 0;
        for (const s of key.split(',')) {
          const pi = parseInt(s, 10);
          const cx = pi % pw, cy = Math.floor(pi / pw);
          if (cx > 0 && cy > 0 && cx < pw - 1 && cy < ph - 1) {
            const ti = finalToggleMap.get((cy - 1) * w + (cx - 1));
            if (ti !== undefined) ws |= (1 << ti);
          }
        }
        return ws;
      }

      // Collect only the universes the carver has actually entered at this step,
      // sorted by their bitmask (base universe "∅" always first).
      const knownVDs = step.allUniverseVDs ?? new Map();
      const activeUniverses = [];
      for (const [key, vd] of knownVDs) {
        activeUniverses.push({ key, u: vdKeyToWS(key), vd });
      }
      activeUniverses.sort((a, b) => a.u - b.u);

      // Current-step active bitmask (which universe the carver is IN right now).
      let activeWS = 0;
      for (const paddedIdx of (step.activated ?? [])) {
        const cx = paddedIdx % pw, cy = Math.floor(paddedIdx / pw);
        if (cx > 0 && cy > 0 && cx < pw - 1 && cy < ph - 1) {
          const ti = finalToggleMap.get((cy - 1) * w + (cx - 1));
          if (ti !== undefined) activeWS |= (1 << ti);
        }
      }

      const universeCount = activeUniverses.length || 1;
      const cols          = Math.min(8, universeCount);
      const rows          = Math.ceil(universeCount / cols);

      const LABEL_H = 14;
      const GAP     = 6;

      const wrap  = canvas.parentElement;
      const availW = Math.max(800, (wrap.clientWidth || 800) - 20);
      const uW    = Math.max(4, Math.floor((availW - GAP * (cols + 1)) / cols / pw));
      const gridPixW = pw * uW;
      const gridPixH = ph * uW;

      canvas.width  = cols * (gridPixW + GAP) + GAP;
      canvas.height = rows * (gridPixH + LABEL_H + GAP) + GAP;

      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      activeUniverses.forEach(({ key, u, vd }, idx) => {
        const col = idx % cols;
        const row = Math.floor(idx / cols);
        const ox  = GAP + col * (gridPixW + GAP);
        const oy  = GAP + row * (gridPixH + LABEL_H + GAP) + LABEL_H;

        // Label: bitmask string + "active" tag when this is the current universe
        const isActive = u === activeWS;
        const lbl = toggleCount > 0 ? u.toString(2).padStart(toggleCount, '0') : '∅';
        const fontSize = Math.max(8, Math.min(11, LABEL_H - 3));
        ctx.font = `${isActive ? '900' : '400'} ${fontSize}px monospace`;
        ctx.fillStyle = isActive ? '#f0c040' : (u === 0 ? '#e4e0da' : '#aaa');
        ctx.fillText(lbl, ox, oy - 3);
        if (isActive) {
          const lblW = ctx.measureText(lbl).width;
          ctx.font = `900 ${fontSize}px monospace`;
          ctx.fillStyle = '#f0c040';
          ctx.fillText(' active', ox + lblW, oy - 3);
        }

        // Draw cells — apply this universe's state (crumbles/keys passable if activated)
        for (let cy = 0; cy < ph; cy++) {
          for (let cx = 0; cx < pw; cx++) {
            let cell = grid[cy * pw + cx];
            if (cx > 0 && cy > 0 && cx < pw - 1 && cy < ph - 1) {
              const outFlat = (cy - 1) * w + (cx - 1);
              if (cell === 5 /* G.CRUMBLE */ || cell === 6 /* G.KEY */) {
                const ti = finalToggleMap.get(outFlat);
                if (ti !== undefined && (u & (1 << ti))) cell = 1;
              } else if (cell === 7 /* G.DOOR */ && _doorRequirements) {
                const req = _doorRequirements.get(outFlat);
                if (req !== undefined && (u & (1 << req))) cell = 1;
              }
            }
            ctx.fillStyle = CELL_COLORS[cell] ?? '#999';
            ctx.fillRect(ox + cx * uW, oy + cy * uW, uW - 1, uW - 1);
          }
        }

        // Frontier dots: red = normal queue entry, blue = door-requeue entry.
        const r = Math.max(2, uW * 0.28);
        const frontierSet = step.frontier?.get(key);
        if (frontierSet?.size) {
          for (const pi of frontierSet) {
            const fcx = pi % pw, fcy = Math.floor(pi / pw);
            const cx2 = ox + fcx * uW + uW / 2, cy2 = oy + fcy * uW + uW / 2;
            ctx.beginPath(); ctx.arc(cx2, cy2, r + 1.5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fill();
            ctx.beginPath(); ctx.arc(cx2, cy2, r, 0, Math.PI * 2);
            ctx.fillStyle = '#ff3030'; ctx.fill();
          }
        }
        const doorFrontierSet = step.doorFrontier?.get(key);
        if (doorFrontierSet?.size) {
          ctx.fillStyle = 'rgba(40, 120, 220, 0.95)';
          for (const pi of doorFrontierSet) {
            const fcx = pi % pw, fcy = Math.floor(pi / pw);
            ctx.beginPath();
            ctx.arc(ox + fcx * uW + uW / 2, oy + fcy * uW + uW / 2, r, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        // Per-universe depth (blue) and chain length (teal) overlays.
        // Only shown once the carver has explored OUTWARD from a cell in this
        // universe — i.e., the cell has VD entries — matching how arrows work.
        if (uW >= 12 && _universeDepths) {
          const uDep = _universeDepths[u];
          const uCL  = _universeChainLengths?.[u];
          const fontSize = Math.max(5, Math.floor(uW * 0.28));
          ctx.font = `700 ${fontSize}px system-ui, sans-serif`;
          for (let cy = 1; cy < ph - 1; cy++) {
            for (let cx = 1; cx < pw - 1; cx++) {
              const cell = grid[cy * pw + cx];
              if (cell === 0 || cell === 3) continue;
              if (!vd?.get(cy * pw + cx)?.size) continue; // not yet explored from here
              const fi = (cy - 1) * w + (cx - 1);
              const d  = uDep?.[fi];
              const cl = uCL?.[fi];
              if (d !== undefined && d >= 0) {
                ctx.fillStyle = '#3a6fd8';
                ctx.fillText(d, ox + cx * uW + 2, oy + cy * uW + fontSize + 1);
              }
              if (cl !== undefined && cl >= 0 && uW >= 18) {
                ctx.fillStyle = '#30a090';
                const txt = String(cl);
                const tw  = ctx.measureText(txt).width;
                ctx.fillText(txt, ox + cx * uW + uW - tw - 2, oy + cy * uW + uW - 3);
              }
            }
          }
        }

        // Per-universe colour identity — dark tinted overlay + border.
        // Base universe (u=0) is neutral; each non-zero bitmask gets a stable hue
        // derived via golden-angle spacing so adjacent bitmasks look distinct.
        if (u !== 0) {
          const hue = (u * 137) % 360;
          ctx.fillStyle = `hsla(${hue}, 55%, 30%, 0.18)`;
          ctx.fillRect(ox, oy, gridPixW, gridPixH);
          ctx.strokeStyle = `hsl(${hue}, 70%, 55%)`;
          ctx.lineWidth   = 2;
          ctx.strokeRect(ox - 1, oy - 1, gridPixW + 1, gridPixH + 1);
        }

        // from / to cell highlights — only in the universe currently being explored
        if (isActive) {
          if (fromX >= 0 && fromY >= 0) {
            ctx.strokeStyle = '#3a6fd8';
            ctx.lineWidth   = Math.max(1, uW * 0.18);
            ctx.strokeRect(ox + fromX * uW + 0.5, oy + fromY * uW + 0.5, uW - 2, uW - 2);
          }
          if (toX >= 0 && toY >= 0) {
            ctx.strokeStyle = '#e8a020';
            ctx.lineWidth   = Math.max(1, uW * 0.18);
            ctx.strokeRect(ox + toX * uW + 0.5, oy + toY * uW + 0.5, uW - 2, uW - 2);
          }
        }

        // Direction arrows for this universe's VD
        if (uW >= 8 && vd) {
          const half   = (uW - 1) / 2;
          const aw     = Math.max(0.5, uW * 0.09);
          const margin = Math.max(1, uW * 0.08);
          for (let cy = 0; cy < ph; cy++) {
            for (let cx = 0; cx < pw; cx++) {
              if (grid[cy * pw + cx] === 0) continue;
              const dirs = vd.get(cy * pw + cx);
              if (!dirs || dirs.size === 0) continue;
              const px = ox + cx * uW, py = oy + cy * uW;
              for (const dir of dirs) {
                ctx.beginPath();
                if (dir === 'UP') {
                  ctx.moveTo(px + half - aw, py + aw * 2 + margin);
                  ctx.lineTo(px + half + aw, py + aw * 2 + margin);
                  ctx.lineTo(px + half,       py + margin);
                } else if (dir === 'DOWN') {
                  ctx.moveTo(px + half - aw, py + uW - 1 - aw * 2 - margin);
                  ctx.lineTo(px + half + aw, py + uW - 1 - aw * 2 - margin);
                  ctx.lineTo(px + half,       py + uW - 1 - margin);
                } else if (dir === 'LEFT') {
                  ctx.moveTo(px + aw * 2 + margin, py + half - aw);
                  ctx.lineTo(px + aw * 2 + margin, py + half + aw);
                  ctx.lineTo(px + margin,            py + half);
                } else if (dir === 'RIGHT') {
                  ctx.moveTo(px + uW - 1 - aw * 2 - margin, py + half - aw);
                  ctx.lineTo(px + uW - 1 - aw * 2 - margin, py + half + aw);
                  ctx.lineTo(px + uW - 1 - margin,            py + half);
                }
                ctx.closePath();
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.55)';
                ctx.lineWidth   = Math.max(1, aw * 0.8);
                ctx.stroke();
                ctx.fillStyle = 'rgba(255, 230, 0, 0.95)';
                ctx.fill();
              }
            }
          }
        }
      });
    }
  </script>
</body>
