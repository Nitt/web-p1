<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f0ede8">
  <title>Slide Puzzle</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── Puzzle view ──────────────────────────────────────────────────── -->
  <section id="puzzle-view" class="view active">

    <header class="puzzle-header">
<h1 id="level-label">Level 1</h1>
      <div class="header-actions">
        <button class="btn-ghost" id="skip-btn" aria-label="Skip level" hidden>Skip</button>
        <button class="btn-ghost" id="auto-solve-btn" aria-label="Auto-solve">Auto</button>
        <button class="btn-ghost" id="restart-btn" aria-label="Restart level">Restart</button>
        <input id="level-jump-input" type="number" min="1" step="1" placeholder="#">
        <button class="btn-ghost" id="level-jump-btn" aria-label="Jump to level">Go</button>
      </div>
    </header>
    <div id="cog-debug" hidden></div>

    <div class="resource-bar">
      <div id="gear-hearts" class="gear-hearts"></div>
    </div>

    <div id="grid-container"></div>

    <nav id="dpad" aria-label="Directional controls">
      <button data-dir="up"    aria-label="Move up">↑</button>
      <button data-dir="left"  aria-label="Move left">←</button>
      <button data-dir="right" aria-label="Move right">→</button>
      <button data-dir="down"  aria-label="Move down">↓</button>
    </nav>

  </section>

  <!-- ── Level select view (stub) ─────────────────────────────────────── -->
  <section id="levelselect-view" class="view">
    <p>Level select — coming soon</p>
  </section>

  <!-- ── Win overlay ──────────────────────────────────────────────────── -->
  <div id="win-banner" hidden>
    <p>Level complete!</p>
    <span class="win-hint">Tap anywhere to continue</span>
  </div>

  <div id="debug-btns" hidden>
    <button id="debug-btn" class="btn-ghost">dbg</button>
    <button id="chain-debug-btn" class="btn-ghost">chain</button>
    <button id="gen-debug-open-btn" class="btn-ghost">gen</button>
    <button id="batch-test-btn" class="btn-ghost">∞</button>
    <label id="speed-control">
      <span id="speed-label">1×</span>
      <input id="speed-slider" type="range" min="0.125" max="8" step="0.125" value="1">
    </label>
  </div>

  <!-- ── Generator debug panel ────────────────────────────────────────────── -->
  <div id="gen-debug-panel" hidden>
    <div id="gen-debug-header">
      <span>Generator Debug</span>
      <div class="gen-debug-controls">
        <label>seed <input id="gen-debug-seed" type="number" value="0"></label>
        <label>w <input id="gen-debug-w" type="number" value="9" min="3" max="20"></label>
        <label>h <input id="gen-debug-h" type="number" value="9" min="3" max="20"></label>
        <button id="gen-debug-run">Generate</button>
        <button id="gen-debug-universes">universes</button>
        <button id="gen-debug-path-only" hidden>path only</button>
        <button id="gen-debug-isolate">isolate</button>
        <button id="gen-debug-close">✕</button>
      </div>
    </div>
    <div id="gen-debug-canvas-wrap">
      <canvas id="gen-debug-canvas"></canvas>
      <div id="gen-debug-legend">
        <span class="gl-untouched">untouched</span>
        <span class="gl-empty">empty</span>
        <span class="gl-sticky">sticky</span>
        <span class="gl-block">block</span>
        <span class="gl-oneway">oneway</span>
        <span class="gl-crumble">crumble</span>
        <span class="gl-key">key</span>
        <span class="gl-door">door</span>
        <span class="gl-from">▶ from</span>
        <span class="gl-to">● to</span>
        <span class="gl-depth">gear depth</span>
        <span class="gl-chain">chain len</span>
      </div>
    </div>
    <div id="gen-debug-label">—</div>
    <input type="range" id="gen-debug-slider" min="0" max="0" value="0">
    <div id="gen-debug-counter">— / —</div>
  </div>

  <script>
    if (new URLSearchParams(location.search).has('debug')) {
      document.getElementById('debug-btns').hidden = false;
      document.getElementById('skip-btn').hidden   = false;
    }
  </script>

  <script type="module">
    import { init, skipLevel, jumpToLevel, startBatchTest } from './game.js';
    import { setSpeedMultiplier } from './renderer.js';

    document.getElementById('debug-btn')
      .addEventListener('click', () => document.body.classList.toggle('debug'));

    document.getElementById('chain-debug-btn')
      .addEventListener('click', () => document.body.classList.toggle('chain-debug'));

    document.getElementById('skip-btn')
      .addEventListener('click', () => skipLevel());

    const levelJumpInput = document.getElementById('level-jump-input');
    document.getElementById('level-jump-btn').addEventListener('click', () => {
      const n = parseInt(levelJumpInput.value);
      if (n >= 1) jumpToLevel(n);
    });
    levelJumpInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const n = parseInt(levelJumpInput.value);
        if (n >= 1) jumpToLevel(n);
      }
    });

    document.getElementById('batch-test-btn')
      .addEventListener('click', () => startBatchTest());

    document.getElementById('speed-slider').addEventListener('input', e => {
      const m = parseFloat(e.target.value);
      setSpeedMultiplier(m);
      document.getElementById('speed-label').textContent = m + '×';
    });

    init();
</script>

  <script type="module">
    import { generateLevel } from './generator.js';
    import { getCurrentLevel } from './game.js';

    const panel   = document.getElementById('gen-debug-panel');
    const canvas  = document.getElementById('gen-debug-canvas');
    const slider  = document.getElementById('gen-debug-slider');
    const label   = document.getElementById('gen-debug-label');
    const counter = document.getElementById('gen-debug-counter');

    document.getElementById('gen-debug-open-btn').addEventListener('click', () => {
      panel.hidden = false;
      // Auto-generate from the current level's seed when opening.
      const lvl = getCurrentLevel();
      if (lvl) {
        document.getElementById('gen-debug-seed').value = lvl.seed ?? 0;
        document.getElementById('gen-debug-w').value    = lvl.width  ?? 9;
        document.getElementById('gen-debug-h').value    = lvl.height ?? 9;
        runGenerate(lvl.weights, lvl.useKeyDoor ?? false, lvl.useTeleporter ?? false, lvl.maxUniverseBits ?? Infinity);
      }
    });
    document.getElementById('gen-debug-close').addEventListener('click', () => { panel.hidden = true; });

    document.getElementById('gen-debug-universes').addEventListener('click', () => {
      _universeMode = !_universeMode;
      if (!_universeMode) { _zoomedUniverseKey = null; canvas.style.cursor = ''; }
      else canvas.style.cursor = 'zoom-in';
      document.getElementById('gen-debug-universes').classList.toggle('active', _universeMode);
      document.getElementById('gen-debug-path-only').hidden = !_universeMode;
      _syncSlider(true);
      renderStep(+slider.value);
    });

    document.getElementById('gen-debug-path-only').addEventListener('click', () => {
      _pathOnlyMode = !_pathOnlyMode;
      document.getElementById('gen-debug-path-only').classList.toggle('active', _pathOnlyMode);
      renderStep(+slider.value);
    });

    document.getElementById('gen-debug-isolate').addEventListener('click', () => {
      const btn = document.getElementById('gen-debug-isolate');
      if (_isolatedPath) {
        // Toggle off: restore to the original position of the last isolated step
        const origIdx = _isolatedPath[_isolatedPath.length - 1];
        _isolatedPath = null;
        _isolatedUniverseKeys = null;
        btn.classList.remove('active');
        _syncSlider();
        slider.value = origIdx;
        renderStep(origIdx);
      } else {
        // Toggle on: guard then build ancestor chain
        if (!_steps.length) return;
        const targetIdx = Math.min(parseInt(slider.value) || 0, _steps.length - 1);
        const chain = buildAncestorChain(targetIdx);
        _isolatedPath = chain;
        _isolatedUniverseKeys = new Set(chain.map(i => _steps[i].currentUniverseKey ?? ''));
        btn.classList.add('active');
        _syncSlider();
        // Jump to step 0 of the chain (earliest ancestor) so the canvas visibly changes
        slider.value = 0;
        renderStep(0);
      }
    });

    let _steps            = [];
    let _depths           = null;   // Int16Array from final generateLevel result
    let _difficulties     = null;   // Float32Array
    let _levelW           = 0;
    let _levelH           = 0;
    let _levelStart       = null;
    let _universeMode         = false;
    let _pathOnlyMode         = false;
    let _doorRequirements     = null;   // Map<outputFlatIdx, toggleIdx> from final result
    let _finalCells           = null;   // Uint8Array output cells (CellType values)
    let _universeDepths       = null;   // Array<Int16Array> indexed by worldState bitmask
    let _pathCellOrder    = null;   // [{px,py,sdx,sdy,ws}] padded-grid cells in path order
    let _pathCellReveal   = null;   // Map<key → stepIndex> when each cell first appears
    let _teleporterMap    = null;   // Map<outputFlatIdx, outputFlatIdx> paired cells
    let _pathWorldStates  = null;   // Set<number> worldState bitmasks on the optimal path
    let _isolatedPath     = null;   // null = off; array of real _steps indices = isolate mode active
    let _isolatedUniverseKeys = null; // Set<string> of universe keys touched by the isolated path
    let _zoomedUniverseKey  = null;   // null = multi-grid; string key = zoomed to one universe
    let _universeLayout     = null;   // { cols, gridPixW, gridPixH, GAP, LABEL_H, keys[] } for click hit-test

    function _syncSlider(jumpToEnd = false) {
      const len = _isolatedPath ? _isolatedPath.length : _steps.length;
      slider.max = Math.max(0, len - 1);
      if (jumpToEnd) slider.value = +slider.max;
    }

    // Walk backward through _steps from targetStepIdx to build the ancestor chain.
    // Two-pass search per hop:
    //   Pass 1 — same-universe destination match (normal sliding ancestry).
    //   Pass 2 — cross-universe transition parent, for when a crumble/key caused a
    //            universe jump and there is no same-universe ancestor for this position:
    //              key case    : most-recent step with toX/toY match in a strict sub-universe
    //              crumble case: most-recent step with fromX/fromY match in a strict sub-universe
    //            Take the more-recent of the two cross-universe candidates.
    function buildAncestorChain(targetStepIdx) {
      const chain = [targetStepIdx];
      let searchX = _steps[targetStepIdx].fromX;
      let searchY = _steps[targetStepIdx].fromY;
      let searchU = _steps[targetStepIdx].currentUniverseKey ?? '';
      let searchFrom = targetStepIdx - 1;

      function parseUKey(k) { return k ? new Set(k.split(',').map(Number)) : new Set(); }

      while (searchFrom >= 0 && searchX >= 0 && searchY >= 0) {
        let foundIdx = -1;

        // Pass 1: same-universe, destination match
        for (let i = searchFrom; i >= 0; i--) {
          const s = _steps[i];
          if (s.toX === searchX && s.toY === searchY &&
              (s.currentUniverseKey ?? '') === searchU) { foundIdx = i; break; }
        }

        // Pass 2: cross-universe transition (only when entering a non-base universe)
        if (foundIdx < 0 && searchU) {
          const uSet = parseUKey(searchU);
          let keyCand = -1, crumbleCand = -1;
          for (let i = searchFrom; i >= 0; i--) {
            const s = _steps[i];
            const suSet = parseUKey(s.currentUniverseKey ?? '');
            if (suSet.size >= uSet.size) continue;
            let isSub = true;
            for (const v of suSet) { if (!uSet.has(v)) { isSub = false; break; } }
            if (!isSub) continue;
            if (keyCand < 0 && s.toX === searchX && s.toY === searchY)         keyCand = i;
            if (crumbleCand < 0 && s.fromX === searchX && s.fromY === searchY) crumbleCand = i;
            if (keyCand >= 0 && crumbleCand >= 0) break;
          }
          foundIdx = Math.max(keyCand, crumbleCand);
        }

        if (foundIdx < 0) break;
        chain.unshift(foundIdx);
        searchX = _steps[foundIdx].fromX;
        searchY = _steps[foundIdx].fromY;
        searchU = _steps[foundIdx].currentUniverseKey ?? '';
        searchFrom = foundIdx - 1;
      }

      return chain;
    }

    function runGenerate(weights, useKeyDoor = false, useTeleporter = false, maxUniverseBits = Infinity) {
      const seed = parseInt(document.getElementById('gen-debug-seed').value) || 0;
      const w    = parseInt(document.getElementById('gen-debug-w').value)    || 9;
      const h    = parseInt(document.getElementById('gen-debug-h').value)    || 9;
      _steps = [];
      _isolatedPath = null;
      _isolatedUniverseKeys = null;
      _zoomedUniverseKey = null;
      document.getElementById('gen-debug-isolate').classList.remove('active');
      const result = generateLevel(w, h, { seed, id: 'dbg', weights, useKeyDoor, useTeleporter, maxUniverseBits, _steps });
      _depths           = result.depths;
      _difficulties     = result.difficulties;
      _levelW           = w;
      _levelH           = h;
      _levelStart       = result.start;
      _doorRequirements = result.doorRequirements;
      _finalCells       = result.cells;
      _teleporterMap    = result.teleporterMap ?? null;
      _universeDepths   = result.universeDepths;
      _pathCellOrder        = null;
      _pathCellReveal       = null;
      _pathWorldStates      = result.pathWorldStates ?? new Set([0]);

      _syncSlider(true);
      renderStep(+slider.value);
    }

    document.getElementById('gen-debug-run').addEventListener('click', () => {
      const lvl = getCurrentLevel();
      runGenerate(lvl?.weights, lvl?.useKeyDoor ?? false, lvl?.useTeleporter ?? false, lvl?.maxUniverseBits ?? Infinity);
    });

    slider.addEventListener('input', () => renderStep(parseInt(slider.value)));

    // Keyboard: arrow keys to step through when panel is open
    document.addEventListener('keydown', e => {
      if (panel.hidden) return;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        slider.value = Math.min(+slider.value + 1, +slider.max);
        renderStep(+slider.value);
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        slider.value = Math.max(+slider.value - 1, 0);
        renderStep(+slider.value);
      }
    });

    canvas.addEventListener('click', e => {
      if (!_universeMode || !_universeLayout) return;
      if (_zoomedUniverseKey !== null) {
        _zoomedUniverseKey = null;
        canvas.style.cursor = 'zoom-in';
        renderStep(+slider.value);
        return;
      }
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width  / rect.width;
      const scaleY = canvas.height / rect.height;
      const mx = (e.clientX - rect.left) * scaleX;
      const my = (e.clientY - rect.top)  * scaleY;
      const { cols, gridPixW, gridPixH, GAP, LABEL_H, keys } = _universeLayout;
      for (let i = 0; i < keys.length; i++) {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const ox = GAP + col * (gridPixW + GAP);
        const oy = GAP + row * (gridPixH + LABEL_H + GAP) + LABEL_H;
        if (mx >= ox && mx <= ox + gridPixW && my >= oy && my <= oy + gridPixH) {
          _zoomedUniverseKey = keys[i];
          canvas.style.cursor = 'zoom-out';
          renderStep(+slider.value);
          return;
        }
      }
    });

    function renderStep(sliderPos) {
      if (!_steps.length) return;
      const actualIdx = _isolatedPath
        ? (_isolatedPath[Math.min(sliderPos, _isolatedPath.length - 1)] ?? 0)
        : Math.min(sliderPos, _steps.length - 1);
      const step = _steps[actualIdx];
      const pf = step.processingFrom;
      const pfStr = pf ? `  [from (${pf.x},${pf.y}) ${pf.dir}]` : '';
      label.textContent   = `g=${step.gearCount}${pfStr}  ${step.label}`;
      counter.textContent = _isolatedPath
        ? `${sliderPos + 1} / ${_isolatedPath.length}  [orig: ${actualIdx + 1}]`
        : `${sliderPos + 1} / ${_steps.length}`;
      if (_universeMode) {
        drawUniverses(step, actualIdx);
      } else {
        drawStep(step, _depths, _difficulties, actualIdx);
      }
    }

    // G enum values → fill colours (matches generator.js G object)
    const CELL_COLORS = [
      '#999',       // 0 UNTOUCHED
      '#e4e0da',    // 1 EMPTY
      '#c8a060',    // 2 STICKY
      '#2b2926',    // 3 BLOCK
      '#7ab8a0',    // 4 ONEWAY
      '#7d5a40',    // 5 CRUMBLE
      '#d4a820',    // 6 KEY
      '#4a80b0',    // 7 DOOR
      '#7b2fbe',    // 8 TELEPORTER
    ];

    function drawStep(step, depths, difficulties, stepIdx) {
      const { grid, pw, ph, fromX, fromY, toX, toY } = step;

      // Size canvas to fit the panel, keeping cells square
      const wrap = canvas.parentElement;
      const maxW = wrap.clientWidth  - 4;
      const maxH = wrap.clientHeight - 32; // leave room for legend
      const size = Math.max(4, Math.floor(Math.min(maxW / pw, maxH / ph)));
      canvas.width  = pw * size;
      canvas.height = ph * size;

      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const stepDepths = step.gearDepths ?? null;
      for (let cy = 0; cy < ph; cy++) {
        for (let cx = 0; cx < pw; cx++) {
          const cell = grid[cy * pw + cx];
          ctx.fillStyle = CELL_COLORS[cell] ?? '#999';
          ctx.fillRect(cx * size, cy * size, size - 1, size - 1);

          // Overlay depth (top-left) and difficulty (bottom-right)
          // for all inner cells, including UNTOUCHED (shown dimmed to reveal dormant values).
          if (size >= 10 && cx > 0 && cy > 0 && cx < pw - 1 && cy < ph - 1 && stepDepths) {
            const ix = cx - 1, iy = cy - 1;
            const fi = iy * _levelW + ix;
            const d  = stepDepths[fi];
            const df = difficulties?.[fi];
            const fontSize = Math.max(5, Math.floor(size * 0.22));
            ctx.font = `700 ${fontSize}px system-ui, sans-serif`;

            if (d !== undefined && d >= 0) {
              // Untouched cells: orange so dormant fallback-depth values are visually distinct
              ctx.fillStyle = cell === 0 ? 'rgba(220,120,0,0.75)' : cell === 3 ? 'rgba(255,255,255,0.25)' : '#3a6fd8';
              ctx.fillText(d, cx * size + 2, cy * size + fontSize + 1);
            }
            if (cell !== 0 && df !== undefined && df >= 0) {
              ctx.fillStyle = cell === 3 ? 'rgba(255,255,255,0.25)' : '#c04020';
              const txt = df % 1 === 0 ? df : df.toFixed(1);
              const tw  = ctx.measureText(txt).width;
              ctx.fillText(txt, cx * size + size - tw - 2, cy * size + size - 3);
            }
          }

          // Direction arrows: show which directions have been explored FROM this cell
          // in the currently-active universe.
          const _activeVD = step.allUniverseVDs?.get(step.currentUniverseKey ?? '');
          if (_activeVD && size >= 8 && cell !== 0 /* not UNTOUCHED */) {
            const bits = _activeVD.get(cy * pw + cx);
            if (bits) {
              const px = cx * size, py = cy * size;
              const half = (size - 1) / 2;
              const aw = Math.max(2, size * 0.18);
              const margin = Math.max(1, size * 0.08);
              ctx.fillStyle = 'rgba(255, 230, 0, 0.85)';
              // bit 0=LEFT,1=UP,2=RIGHT,3=DOWN
              if (bits & 1) { ctx.beginPath(); ctx.moveTo(px + aw * 2 + margin, py + half - aw); ctx.lineTo(px + aw * 2 + margin, py + half + aw); ctx.lineTo(px + margin, py + half); ctx.closePath(); ctx.fill(); }
              if (bits & 2) { ctx.beginPath(); ctx.moveTo(px + half - aw, py + aw * 2 + margin); ctx.lineTo(px + half + aw, py + aw * 2 + margin); ctx.lineTo(px + half, py + margin); ctx.closePath(); ctx.fill(); }
              if (bits & 4) { ctx.beginPath(); ctx.moveTo(px + size - 1 - aw * 2 - margin, py + half - aw); ctx.lineTo(px + size - 1 - aw * 2 - margin, py + half + aw); ctx.lineTo(px + size - 1 - margin, py + half); ctx.closePath(); ctx.fill(); }
              if (bits & 8) { ctx.beginPath(); ctx.moveTo(px + half - aw, py + size - 1 - aw * 2 - margin); ctx.lineTo(px + half + aw, py + size - 1 - aw * 2 - margin); ctx.lineTo(px + half, py + size - 1 - margin); ctx.closePath(); ctx.fill(); }
            }
          }
        }
      }

      // Teleporter decoration — cells are already drawn as CELL_COLORS[8] (purple)
      // since G.TELEPORTER is now placed directly in the carving grid. Only the
      // connector line and ring/label overlay need to be drawn here.
      if (step.teleporterPairs) {
        const half = (size - 1) / 2;
        const drawn = new Set();
        ctx.save();
        ctx.strokeStyle = 'rgba(185, 100, 255, 0.55)';
        ctx.lineWidth   = Math.max(1, size * 0.08);
        ctx.setLineDash([Math.max(2, size * 0.2), Math.max(2, size * 0.2)]);
        for (const [pni1, pni2] of step.teleporterPairs) {
          if (drawn.has(pni1)) continue;
          drawn.add(pni1); drawn.add(pni2);
          const px1 = pni1 % pw, py1 = Math.floor(pni1 / pw);
          const px2 = pni2 % pw, py2 = Math.floor(pni2 / pw);
          ctx.beginPath();
          ctx.moveTo(px1 * size + half, py1 * size + half);
          ctx.lineTo(px2 * size + half, py2 * size + half);
          ctx.stroke();
        }
        ctx.setLineDash([]);
        for (const pni of step.teleporterPairs.keys()) {
          const px = pni % pw, py = Math.floor(pni / pw);
          const mx = px * size + half, my = py * size + half;
          const r1 = Math.max(1.5, half * 0.72);
          ctx.strokeStyle = 'rgba(220, 170, 255, 0.9)';
          ctx.lineWidth   = Math.max(1, size * 0.1);
          ctx.beginPath(); ctx.arc(mx, my, r1, 0, Math.PI * 2); ctx.stroke();
          if (size >= 14) {
            const r2 = Math.max(1, half * 0.38);
            ctx.strokeStyle = 'rgba(220, 170, 255, 0.5)';
            ctx.lineWidth   = Math.max(0.5, size * 0.06);
            ctx.beginPath(); ctx.arc(mx, my, r2, 0, Math.PI * 2); ctx.stroke();
          }
          if (size >= 10) {
            const fontSize = Math.max(5, Math.floor(size * 0.28));
            ctx.font = `700 ${fontSize}px system-ui, sans-serif`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillStyle = 'rgba(240, 210, 255, 0.95)';
            ctx.fillText('T', mx, my);
            ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
          }
        }
        ctx.restore();
      }

      // "from" highlight — blue outline
      if (fromX >= 0 && fromY >= 0) {
        ctx.strokeStyle = '#3a6fd8';
        ctx.lineWidth   = Math.max(2, size * 0.15);
        ctx.strokeRect(fromX * size + 1, fromY * size + 1, size - 3, size - 3);
      }

      // "to" highlight — orange outline
      if (toX >= 0 && toY >= 0) {
        ctx.strokeStyle = '#e8a020';
        ctx.lineWidth   = Math.max(2, size * 0.15);
        ctx.strokeRect(toX * size + 1, toY * size + 1, size - 3, size - 3);
      }

    }
    // ── Universe matrix view ──────────────────────────────────────────────────
    // Shows all 2^N worldState variants of the current generation step side by
    // side.  Toggle map is built from _finalCells so bitmask indices stay
    // consistent across steps and match the _doorRequirements indices.
    function drawUniverses(step, stepIdx) {
      if (!_finalCells) return;
      const { grid, pw, ph, fromX, fromY, toX, toY } = step;
      const w = pw - 2, h = ph - 2;

      // Build toggle map from final output cells (CellType: CRUMBLE=7, KEY=8)
      // so toggle indices are stable and match _doorRequirements.
      const finalToggleMap = new Map(); // outputFlatIdx → toggleIdx
      let toggleCount = 0;
      for (let i = 0; i < _finalCells.length; i++) {
        if (_finalCells[i] === 7 || _finalCells[i] === 8) finalToggleMap.set(i, toggleCount++);
      }

      // Convert a VD key (sorted padded cell indices joined by ',') → bitmask integer.
      function vdKeyToWS(key) {
        if (!key) return 0;
        let ws = 0;
        for (const s of key.split(',')) {
          const pi = parseInt(s, 10);
          const cx = pi % pw, cy = Math.floor(pi / pw);
          if (cx > 0 && cy > 0 && cx < pw - 1 && cy < ph - 1) {
            const ti = finalToggleMap.get((cy - 1) * w + (cx - 1));
            if (ti !== undefined) ws |= (1 << ti);
          }
        }
        return ws;
      }

      const knownVDs = step.allUniverseVDs ?? new Map();
      const activeUniverses = [];
      for (const [key, vd] of knownVDs) {
        activeUniverses.push({ key, u: vdKeyToWS(key), vd });
      }
      activeUniverses.sort((a, b) => a.u - b.u);

      // Current-step active bitmask (which universe the carver is IN right now).
      let activeWS = 0;
      for (const paddedIdx of (step.activated ?? [])) {
        const cx = paddedIdx % pw, cy = Math.floor(paddedIdx / pw);
        if (cx > 0 && cy > 0 && cx < pw - 1 && cy < ph - 1) {
          const ti = finalToggleMap.get((cy - 1) * w + (cx - 1));
          if (ti !== undefined) activeWS |= (1 << ti);
        }
      }

      // Filter universes: isolate mode takes priority, then path-only mode.
      let displayUniverses = _isolatedUniverseKeys
        ? activeUniverses.filter(({ key }) => _isolatedUniverseKeys.has(key))
        : (_pathOnlyMode && _pathWorldStates && _pathWorldStates.size > 0)
          ? activeUniverses.filter(({ u }) => _pathWorldStates.has(u))
          : activeUniverses;

      // Zoom mode: narrow to a single universe so it fills the canvas.
      if (_zoomedUniverseKey !== null) {
        const zi = displayUniverses.find(d => d.key === _zoomedUniverseKey);
        if (zi) displayUniverses = [zi];
        else _zoomedUniverseKey = null; // stale key — fall back to multi-grid
      }

      const universeCount = displayUniverses.length || 1;
      const cols          = Math.min(8, universeCount);
      const rows          = Math.ceil(universeCount / cols);

      const LABEL_H = 14;
      const GAP     = 6;

      const wrap   = canvas.parentElement;
      const availW = Math.max(400, (wrap.clientWidth  || 400) - 20);
      const availH = Math.max(200, (wrap.clientHeight || 400) - 32); // subtract legend row
      const maxUWW = Math.max(4, Math.floor((availW - GAP * (cols + 1)) / cols / pw));
      const maxUWH = Math.max(4, Math.floor((availH - GAP * (rows + 1) - LABEL_H * rows) / rows / ph));
      const uW     = Math.min(maxUWW, maxUWH);
      const gridPixW = pw * uW;
      const gridPixH = ph * uW;
      _universeLayout = { cols, gridPixW, gridPixH, GAP, LABEL_H, keys: displayUniverses.map(d => d.key) };

      canvas.width  = cols * (gridPixW + GAP) + GAP;
      canvas.height = rows * (gridPixH + LABEL_H + GAP) + GAP;

      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      displayUniverses.forEach(({ key, u, vd }, idx) => {
        const col = idx % cols;
        const row = Math.floor(idx / cols);
        const ox  = GAP + col * (gridPixW + GAP);
        const oy  = GAP + row * (gridPixH + LABEL_H + GAP) + LABEL_H;

        // Label: bitmask string + "active" tag when this is the current universe
        const isActive = u === activeWS;
        const lbl = toggleCount > 0 ? u.toString(2).padStart(toggleCount, '0') : '∅';
        const fontSize = Math.max(8, Math.min(11, LABEL_H - 3));
        ctx.font = `${isActive ? '900' : '400'} ${fontSize}px monospace`;
        ctx.fillStyle = isActive ? '#f0c040' : (u === 0 ? '#e4e0da' : '#aaa');
        ctx.fillText(lbl, ox, oy - 3);
        if (isActive) {
          const lblW = ctx.measureText(lbl).width;
          ctx.font = `900 ${fontSize}px monospace`;
          ctx.fillStyle = '#f0c040';
          ctx.fillText(' active', ox + lblW, oy - 3);
        }

        // Draw cells — apply this universe's state (crumbles/keys passable if activated)
        for (let cy = 0; cy < ph; cy++) {
          for (let cx = 0; cx < pw; cx++) {
            let cell = grid[cy * pw + cx];
            if (cx > 0 && cy > 0 && cx < pw - 1 && cy < ph - 1) {
              const outFlat = (cy - 1) * w + (cx - 1);
              if (cell === 5 /* G.CRUMBLE */ || cell === 6 /* G.KEY */) {
                const ti = finalToggleMap.get(outFlat);
                if (ti !== undefined && (u & (1 << ti))) cell = 1;
              } else if (cell === 7 /* G.DOOR */ && _doorRequirements) {
                const req = _doorRequirements.get(outFlat);
                if (req !== undefined && (u & (1 << req))) cell = 1;
              }
            }
            ctx.fillStyle = CELL_COLORS[cell] ?? '#999';
            ctx.fillRect(ox + cx * uW, oy + cy * uW, uW - 1, uW - 1);
          }
        }

        // Frontier dots: red = normal queue entry, blue = door-requeue entry.
        const r = Math.max(2, uW * 0.28);
        const frontierSet = step.frontier?.get(key);
        if (frontierSet?.size) {
          for (const pi of frontierSet) {
            const fcx = pi % pw, fcy = Math.floor(pi / pw);
            const cx2 = ox + fcx * uW + uW / 2, cy2 = oy + fcy * uW + uW / 2;
            ctx.beginPath(); ctx.arc(cx2, cy2, r + 1.5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fill();
            ctx.beginPath(); ctx.arc(cx2, cy2, r, 0, Math.PI * 2);
            ctx.fillStyle = '#ff3030'; ctx.fill();
          }
        }
        const doorFrontierSet = step.doorFrontier?.get(key);
        if (doorFrontierSet?.size) {
          ctx.fillStyle = 'rgba(40, 120, 220, 0.95)';
          for (const pi of doorFrontierSet) {
            const fcx = pi % pw, fcy = Math.floor(pi / pw);
            ctx.beginPath();
            ctx.arc(ox + fcx * uW + uW / 2, oy + fcy * uW + uW / 2, r, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        // Gear-count (depth) overlay — blue number in top-left of each carved cell.
        // Uses per-universe depths so each panel shows the minimum gears for that worldState.
        const uDepths = _universeDepths?.get(u);
        if (uW >= 12 && uDepths) {
          const fontSize = Math.max(5, Math.floor(uW * 0.28));
          ctx.font = `700 ${fontSize}px system-ui, sans-serif`;
          for (let cy = 1; cy < ph - 1; cy++) {
            for (let cx = 1; cx < pw - 1; cx++) {
              const cell = grid[cy * pw + cx];
              if (cell === 0 || cell === 3) continue;
              if (!vd?.get(cy * pw + cx)) continue; // only show if carver has explored here in this universe
              const fi = (cy - 1) * w + (cx - 1);
              const d  = uDepths[fi];
              if (d !== undefined && d >= 0) {
                ctx.fillStyle = '#3a6fd8';
                ctx.fillText(d, ox + cx * uW + 2, oy + cy * uW + fontSize + 1);
              }
            }
          }
        }

        // Per-universe colour identity — dark tinted overlay + border.
        // Base universe (u=0) is neutral; each non-zero bitmask gets a stable hue
        // derived via golden-angle spacing so adjacent bitmasks look distinct.
        if (u !== 0) {
          const hue = (u * 137) % 360;
          ctx.fillStyle = `hsla(${hue}, 55%, 30%, 0.18)`;
          ctx.fillRect(ox, oy, gridPixW, gridPixH);
          ctx.strokeStyle = `hsl(${hue}, 70%, 55%)`;
          ctx.lineWidth   = 2;
          ctx.strokeRect(ox - 1, oy - 1, gridPixW + 1, gridPixH + 1);
        }

        // from / to cell highlights — only in the universe currently being explored
        if (isActive) {
          if (fromX >= 0 && fromY >= 0) {
            ctx.strokeStyle = '#3a6fd8';
            ctx.lineWidth   = Math.max(1, uW * 0.18);
            ctx.strokeRect(ox + fromX * uW + 0.5, oy + fromY * uW + 0.5, uW - 2, uW - 2);
          }
          if (toX >= 0 && toY >= 0) {
            ctx.strokeStyle = '#e8a020';
            ctx.lineWidth   = Math.max(1, uW * 0.18);
            ctx.strokeRect(ox + toX * uW + 0.5, oy + toY * uW + 0.5, uW - 2, uW - 2);
          }
        }

        // Direction arrows for this universe's VD (bitmask: bit 0=LEFT,1=UP,2=RIGHT,3=DOWN)
        if (uW >= 8 && vd) {
          const half   = (uW - 1) / 2;
          const aw     = Math.max(0.5, uW * 0.09);
          const margin = Math.max(1, uW * 0.08);
          for (let cy = 0; cy < ph; cy++) {
            for (let cx = 0; cx < pw; cx++) {
              if (grid[cy * pw + cx] === 0) continue;
              const bits = vd.get(cy * pw + cx);
              if (!bits) continue;
              const px = ox + cx * uW, py = oy + cy * uW;
              ctx.strokeStyle = 'rgba(0, 0, 0, 0.55)';
              ctx.lineWidth   = Math.max(1, aw * 0.8);
              ctx.fillStyle   = 'rgba(255, 230, 0, 0.95)';
              if (bits & 1) { ctx.beginPath(); ctx.moveTo(px + aw * 2 + margin, py + half - aw); ctx.lineTo(px + aw * 2 + margin, py + half + aw); ctx.lineTo(px + margin, py + half); ctx.closePath(); ctx.stroke(); ctx.fill(); }
              if (bits & 2) { ctx.beginPath(); ctx.moveTo(px + half - aw, py + aw * 2 + margin); ctx.lineTo(px + half + aw, py + aw * 2 + margin); ctx.lineTo(px + half, py + margin); ctx.closePath(); ctx.stroke(); ctx.fill(); }
              if (bits & 4) { ctx.beginPath(); ctx.moveTo(px + uW - 1 - aw * 2 - margin, py + half - aw); ctx.lineTo(px + uW - 1 - aw * 2 - margin, py + half + aw); ctx.lineTo(px + uW - 1 - margin, py + half); ctx.closePath(); ctx.stroke(); ctx.fill(); }
              if (bits & 8) { ctx.beginPath(); ctx.moveTo(px + half - aw, py + uW - 1 - aw * 2 - margin); ctx.lineTo(px + half + aw, py + uW - 1 - aw * 2 - margin); ctx.lineTo(px + half, py + uW - 1 - margin); ctx.closePath(); ctx.stroke(); ctx.fill(); }
            }
          }
        }

        // Teleporter decoration — G.TELEPORTER cells are now in the carving grid
        // (drawn as CELL_COLORS[8]). Only the connector line + ring/label need overlaying.
        if (step.teleporterPairs) {
          const half = (uW - 1) / 2;
          const drawn = new Set();
          ctx.save();
          ctx.strokeStyle = 'rgba(185, 100, 255, 0.55)';
          ctx.lineWidth   = Math.max(1, uW * 0.08);
          ctx.setLineDash([Math.max(2, uW * 0.2), Math.max(2, uW * 0.2)]);
          for (const [pni1, pni2] of step.teleporterPairs) {
            if (drawn.has(pni1)) continue;
            drawn.add(pni1); drawn.add(pni2);
            const px1 = pni1 % pw, py1 = Math.floor(pni1 / pw);
            const px2 = pni2 % pw, py2 = Math.floor(pni2 / pw);
            ctx.beginPath();
            ctx.moveTo(ox + px1 * uW + half, oy + py1 * uW + half);
            ctx.lineTo(ox + px2 * uW + half, oy + py2 * uW + half);
            ctx.stroke();
          }
          ctx.setLineDash([]);
          for (const pni of step.teleporterPairs.keys()) {
            const px = pni % pw, py = Math.floor(pni / pw);
            const mx = ox + px * uW + half, my = oy + py * uW + half;
            const r1 = Math.max(1.5, half * 0.72);
            ctx.strokeStyle = 'rgba(220, 170, 255, 0.9)';
            ctx.lineWidth   = Math.max(1, uW * 0.1);
            ctx.beginPath(); ctx.arc(mx, my, r1, 0, Math.PI * 2); ctx.stroke();
            if (uW >= 14) {
              const r2 = Math.max(1, half * 0.38);
              ctx.strokeStyle = 'rgba(220, 170, 255, 0.5)';
              ctx.lineWidth   = Math.max(0.5, uW * 0.06);
              ctx.beginPath(); ctx.arc(mx, my, r2, 0, Math.PI * 2); ctx.stroke();
            }
            if (uW >= 10) {
              const fontSize = Math.max(5, Math.floor(uW * 0.28));
              ctx.font = `700 ${fontSize}px system-ui, sans-serif`;
              ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
              ctx.fillStyle = 'rgba(240, 210, 255, 0.95)';
              ctx.fillText('T', mx, my);
              ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
            }
          }
          ctx.restore();
        }

        // Pink path overlay — ghost shows ancestor-universe trajectory; solid line + dots
        // show only the cells belonging to this universe (so lines don't cross walls).
        if (_pathCellOrder && _pathCellReveal) {
          const currentStep = stepIdx ?? parseInt(slider.value);
          const half2 = (uW - 1) / 2;

          ctx.save();
          ctx.lineJoin = 'round';
          ctx.lineCap  = 'round';
          ctx.strokeStyle = '#ff2d9b';
          ctx.shadowColor = '#ff2d9b';

          // 1. Dashed ghost: full path trajectory across ALL worldStates as a faint reference.
          //    Very low alpha + thin dotted style reads as "trajectory context", not real path,
          //    so wall-crossings are visually acceptable (the solid line never crosses walls).
          ctx.shadowBlur  = 0;
          ctx.globalAlpha = 0.18;
          ctx.lineWidth   = Math.max(0.5, uW * 0.07);
          ctx.setLineDash([Math.max(1.5, uW * 0.22), Math.max(1, uW * 0.22)]);
          ctx.beginPath();
          let ghostLine = false;
          for (const { px, py, sdx, sdy, ws: cellWS } of _pathCellOrder) {
            if ((_pathCellReveal.get(`${px},${py},${cellWS},${sdx},${sdy}`) ?? Infinity) <= currentStep) {
              const cx2 = ox + px * uW + half2, cy2 = oy + py * uW + half2;
              if (!ghostLine) { ctx.moveTo(cx2, cy2); ghostLine = true; }
              else             { ctx.lineTo(cx2, cy2); }
            } else { ghostLine = false; }
          }
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.globalAlpha = 1;

          // 2. Solid bright line — only cells whose worldState matches this universe,
          //    so the line never cuts through walls that are closed in this universe.
          const drawPathLine = (lw, alpha, blur) => {
            ctx.lineWidth   = lw;
            ctx.globalAlpha = alpha;
            ctx.shadowBlur  = blur;
            ctx.beginPath();
            let inLine = false;
            for (const { px, py, ws: cellWS, sdx, sdy } of _pathCellOrder) {
              if (cellWS !== u) { inLine = false; continue; }
              if ((_pathCellReveal.get(`${px},${py},${cellWS},${sdx},${sdy}`) ?? Infinity) <= currentStep) {
                const cx2 = ox + px * uW + half2, cy2 = oy + py * uW + half2;
                if (!inLine) { ctx.moveTo(cx2, cy2); inLine = true; }
                else          { ctx.lineTo(cx2, cy2); }
              } else { inLine = false; }
            }
            ctx.stroke();
          };
          drawPathLine(Math.max(2, uW * 0.3),   0.55, Math.max(5, uW * 0.55)); // glow
          drawPathLine(Math.max(1.5, uW * 0.18), 1,   0);                       // solid

          // 3. Dots at each path cell: large + white centre for this universe,
          //    tiny + faint for other-universe cells (context without cluttering).
          ctx.shadowBlur = 0;
          for (const { px, py, ws: cellWS, sdx, sdy } of _pathCellOrder) {
            if ((_pathCellReveal.get(`${px},${py},${cellWS},${sdx},${sdy}`) ?? Infinity) > currentStep) continue;
            const here = cellWS === u;
            const cx2  = ox + px * uW + half2, cy2 = oy + py * uW + half2;
            const dotR = here ? Math.max(1.5, uW * 0.16) : Math.max(1, uW * 0.09);
            ctx.globalAlpha = here ? 1 : 0.4;
            ctx.beginPath(); ctx.arc(cx2, cy2, dotR, 0, Math.PI * 2);
            ctx.fillStyle = '#ff2d9b'; ctx.fill();
            if (here) {
              ctx.globalAlpha = 1;
              ctx.beginPath(); ctx.arc(cx2, cy2, Math.max(0.8, dotR * 0.4), 0, Math.PI * 2);
              ctx.fillStyle = 'white'; ctx.fill();
            }
          }
          ctx.globalAlpha = 1;

          ctx.restore();
        }
      });
    }
  </script>
</body>
</html>
