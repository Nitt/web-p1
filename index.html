<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f0ede8">
  <title>Slide Puzzle</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── Puzzle view ──────────────────────────────────────────────────── -->
  <section id="puzzle-view" class="view active">

    <header class="puzzle-header">
<h1 id="level-label">Level 1</h1>
      <div class="header-actions">
        <button class="btn-ghost" id="skip-btn" aria-label="Skip level" hidden>Skip</button>
        <button class="btn-ghost" id="restart-btn" aria-label="Restart level">Restart</button>
      </div>
    </header>
    <div id="cog-debug" hidden></div>

    <div class="resource-bar">
      <div id="gear-hearts" class="gear-hearts"></div>
      <div class="chain-bar-track">
        <div id="chain-bar-fill" class="chain-bar-fill"></div>
      </div>
    </div>

    <div id="grid-container"></div>

    <nav id="dpad" aria-label="Directional controls">
      <button data-dir="up"    aria-label="Move up">↑</button>
      <button data-dir="left"  aria-label="Move left">←</button>
      <button data-dir="right" aria-label="Move right">→</button>
      <button data-dir="down"  aria-label="Move down">↓</button>
    </nav>

  </section>

  <!-- ── Level select view (stub) ─────────────────────────────────────── -->
  <section id="levelselect-view" class="view">
    <p>Level select — coming soon</p>
  </section>

  <!-- ── Win overlay ──────────────────────────────────────────────────── -->
  <div id="win-banner" hidden>
    <p>Level complete!</p>
    <span class="win-hint">Tap anywhere to continue</span>
  </div>

  <!-- ── Dead-end overlay ─────────────────────────────────────────────── -->
  <div id="dead-end-banner" hidden>
    <p>No way out!</p>
    <span class="win-hint">Tap anywhere to restart</span>
  </div>

  <div id="debug-btns" hidden>
    <button id="debug-btn" class="btn-ghost">dbg</button>
    <button id="chain-debug-btn" class="btn-ghost">chain</button>
    <button id="gen-debug-open-btn" class="btn-ghost">gen</button>
    <label id="speed-control">
      <span id="speed-label">1×</span>
      <input id="speed-slider" type="range" min="0.25" max="8" step="0.25" value="1">
    </label>
  </div>

  <!-- ── Generator debug panel ────────────────────────────────────────────── -->
  <div id="gen-debug-panel" hidden>
    <div id="gen-debug-header">
      <span>Generator Debug</span>
      <div class="gen-debug-controls">
        <label>seed <input id="gen-debug-seed" type="number" value="0"></label>
        <label>w <input id="gen-debug-w" type="number" value="9" min="3" max="20"></label>
        <label>h <input id="gen-debug-h" type="number" value="9" min="3" max="20"></label>
        <button id="gen-debug-run">Generate</button>
        <button id="gen-debug-close">✕</button>
      </div>
    </div>
    <div id="gen-debug-canvas-wrap">
      <canvas id="gen-debug-canvas"></canvas>
      <div id="gen-debug-legend">
        <span class="gl-untouched">untouched</span>
        <span class="gl-empty">empty</span>
        <span class="gl-sticky">sticky</span>
        <span class="gl-block">block</span>
        <span class="gl-oneway">oneway</span>
        <span class="gl-crumble">crumble</span>
        <span class="gl-from">▶ from</span>
        <span class="gl-to">● to</span>
      </div>
    </div>
    <div id="gen-debug-label">—</div>
    <input type="range" id="gen-debug-slider" min="0" max="0" value="0">
    <div id="gen-debug-counter">— / —</div>
  </div>

  <script>
    if (new URLSearchParams(location.search).has('debug')) {
      document.getElementById('debug-btns').hidden = false;
      document.getElementById('skip-btn').hidden   = false;
    }
  </script>

  <script type="module">
    import { init, skipLevel } from './game.js';
    import { setSpeedMultiplier } from './renderer.js';

    document.getElementById('debug-btn')
      .addEventListener('click', () => document.body.classList.toggle('debug'));

    document.getElementById('chain-debug-btn')
      .addEventListener('click', () => document.body.classList.toggle('chain-debug'));

    document.getElementById('skip-btn')
      .addEventListener('click', () => skipLevel());

    document.getElementById('speed-slider').addEventListener('input', e => {
      const m = parseFloat(e.target.value);
      setSpeedMultiplier(m);
      document.getElementById('speed-label').textContent = m + '×';
    });

    init();
</script>

  <script type="module">
    import { generateLevel, computeStepAnalysis } from './generator.js';
    import { getCurrentLevel } from './game.js';

    const panel   = document.getElementById('gen-debug-panel');
    const canvas  = document.getElementById('gen-debug-canvas');
    const slider  = document.getElementById('gen-debug-slider');
    const label   = document.getElementById('gen-debug-label');
    const counter = document.getElementById('gen-debug-counter');

    document.getElementById('gen-debug-open-btn').addEventListener('click', () => {
      panel.hidden = false;
      // Auto-generate from the current level's seed when opening.
      const lvl = getCurrentLevel();
      if (lvl) {
        document.getElementById('gen-debug-seed').value = lvl.seed ?? 0;
        document.getElementById('gen-debug-w').value    = lvl.width  ?? 9;
        document.getElementById('gen-debug-h').value    = lvl.height ?? 9;
        runGenerate(lvl.weights);
      }
    });
    document.getElementById('gen-debug-close').addEventListener('click', () => { panel.hidden = true; });

    let _steps       = [];
    let _depths      = null;   // Int16Array from final generateLevel result
    let _difficulties = null;  // Float32Array
    let _levelW      = 0;
    let _levelH      = 0;
    let _levelStart  = null;

    function runGenerate(weights) {
      const seed = parseInt(document.getElementById('gen-debug-seed').value) || 0;
      const w    = parseInt(document.getElementById('gen-debug-w').value)    || 9;
      const h    = parseInt(document.getElementById('gen-debug-h').value)    || 9;
      _steps = [];
      const result = generateLevel(w, h, { seed, id: 'dbg', weights, _steps });
      _depths       = result.depths;
      _difficulties = result.difficulties;
      _levelW       = w;
      _levelH       = h;
      _levelStart   = result.start;
      slider.max   = Math.max(0, _steps.length - 1);
      slider.value = _steps.length - 1;
      renderStep(_steps.length - 1);
    }

    document.getElementById('gen-debug-run').addEventListener('click', () => {
      const lvl = getCurrentLevel();
      runGenerate(lvl?.weights);
    });

    slider.addEventListener('input', () => renderStep(parseInt(slider.value)));

    // Keyboard: arrow keys to step through when panel is open
    document.addEventListener('keydown', e => {
      if (panel.hidden) return;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        slider.value = Math.min(+slider.value + 1, +slider.max);
        renderStep(+slider.value);
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        slider.value = Math.max(+slider.value - 1, 0);
        renderStep(+slider.value);
      }
    });

    function renderStep(i) {
      if (!_steps.length) return;
      const step = _steps[Math.min(i, _steps.length - 1)];
      label.textContent   = step.label;
      counter.textContent = `${i + 1} / ${_steps.length}`;
      // Use final depth/difficulty values so numbers stay stable as the slider advances.
      // The per-step recomputation caused values to jump as partial grids opened new paths.
      drawStep(step, _depths, _difficulties);
    }

    // G enum values → fill colours (matches generator.js G object)
    const CELL_COLORS = [
      '#999',       // 0 UNTOUCHED
      '#e4e0da',    // 1 EMPTY
      '#c8a060',    // 2 STICKY
      '#2b2926',    // 3 BLOCK
      '#7ab8a0',    // 4 ONEWAY
      '#7d5a40',    // 5 CRUMBLE
    ];

    function drawStep(step, depths, difficulties) {
      const { grid, pw, ph, fromX, fromY, toX, toY } = step;

      // Size canvas to fit the panel, keeping cells square
      const wrap = canvas.parentElement;
      const maxW = wrap.clientWidth  - 4;
      const maxH = wrap.clientHeight - 32; // leave room for legend
      const size = Math.max(4, Math.floor(Math.min(maxW / pw, maxH / ph)));
      canvas.width  = pw * size;
      canvas.height = ph * size;

      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let cy = 0; cy < ph; cy++) {
        for (let cx = 0; cx < pw; cx++) {
          const cell = grid[cy * pw + cx];
          ctx.fillStyle = CELL_COLORS[cell] ?? '#999';
          ctx.fillRect(cx * size, cy * size, size - 1, size - 1);

          // Overlay depth (top-left, blue) and difficulty (bottom-right, red)
          // only for inner cells (not border padding) and only when data exists.
          if (size >= 10 && cx > 0 && cy > 0 && cx < pw - 1 && cy < ph - 1 && depths && cell !== 0) {
            const ix = cx - 1, iy = cy - 1;
            const fi = iy * _levelW + ix;
            const d  = depths[fi];
            const df = difficulties?.[fi];
            const fontSize = Math.max(5, Math.floor(size * 0.22));
            ctx.font = `700 ${fontSize}px system-ui, sans-serif`;

            if (d !== undefined && d >= 0) {
              ctx.fillStyle = cell === 3 ? 'rgba(255,255,255,0.25)' : '#3a6fd8';
              ctx.fillText(d, cx * size + 2, cy * size + fontSize + 1);
            }
            if (df !== undefined && df >= 0) {
              ctx.fillStyle = cell === 3 ? 'rgba(255,255,255,0.25)' : '#c04020';
              const txt = df % 1 === 0 ? df : df.toFixed(1);
              const tw  = ctx.measureText(txt).width;
              ctx.fillText(txt, cx * size + size - tw - 2, cy * size + size - 3);
            }
          }

          // Direction arrows: show which directions have been explored FROM this cell.
          // visitedDirs uses padded indices (cy * pw + cx) directly.
          if (step.visitedDirs && size >= 8 && cell !== 0 /* not UNTOUCHED */) {
            const dirs = step.visitedDirs.get(cy * pw + cx);
            if (dirs && dirs.size > 0) {
              const px = cx * size, py = cy * size;
              const half = (size - 1) / 2;
              const aw = Math.max(2, size * 0.18); // half-width of arrow base
              const margin = Math.max(1, size * 0.08); // gap from cell edge
              ctx.fillStyle = 'rgba(255, 230, 0, 0.85)';
              for (const dir of dirs) {
                ctx.beginPath();
                if (dir === 'UP') {
                  ctx.moveTo(px + half - aw, py + aw * 2 + margin);
                  ctx.lineTo(px + half + aw, py + aw * 2 + margin);
                  ctx.lineTo(px + half,       py + margin);
                } else if (dir === 'DOWN') {
                  ctx.moveTo(px + half - aw, py + size - 1 - aw * 2 - margin);
                  ctx.lineTo(px + half + aw, py + size - 1 - aw * 2 - margin);
                  ctx.lineTo(px + half,       py + size - 1 - margin);
                } else if (dir === 'LEFT') {
                  ctx.moveTo(px + aw * 2 + margin, py + half - aw);
                  ctx.lineTo(px + aw * 2 + margin, py + half + aw);
                  ctx.lineTo(px + margin,            py + half);
                } else if (dir === 'RIGHT') {
                  ctx.moveTo(px + size - 1 - aw * 2 - margin, py + half - aw);
                  ctx.lineTo(px + size - 1 - aw * 2 - margin, py + half + aw);
                  ctx.lineTo(px + size - 1 - margin,            py + half);
                }
                ctx.closePath();
                ctx.fill();
              }
            }
          }
        }
      }

      // "from" highlight — blue outline
      if (fromX >= 0 && fromY >= 0) {
        ctx.strokeStyle = '#3a6fd8';
        ctx.lineWidth   = Math.max(2, size * 0.15);
        ctx.strokeRect(fromX * size + 1, fromY * size + 1, size - 3, size - 3);
      }

      // "to" highlight — orange outline
      if (toX >= 0 && toY >= 0) {
        ctx.strokeStyle = '#e8a020';
        ctx.lineWidth   = Math.max(2, size * 0.15);
        ctx.strokeRect(toX * size + 1, toY * size + 1, size - 3, size - 3);
      }
    }
  </script>
</body>
</html>
